version: "3.8"

services: # "Buradan sonra tanımladığım her blok, ayrı bir container olacak" demek.
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bigdata-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    depends_on: 
      - zookeeper # "Zookeeper ayağa kalkmadan beni başlatma" diyor. 
    ports:
      - "9092:9092" # container'lar arası iletişim (Spark container'ı Kafka'ya bağlanırken bunu kullanacak)
      - "29092:29092" # senin bilgisayarından Kafka'ya bağlanmak için (Producer'ı dışarıdan test edersek)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092 # Bu olmadan ya iç bağlantı ya dış bağlantı çalışmaz, ikisi birden çalışmaz. Standart Docker+Kafka tuzağıdır.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bigdata-net
    
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - bigdata-net

  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: producer
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/data:ro
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: climate-events
      DATA_PATH: /data/daily_weather.parquet
      MESSAGES_PER_SECOND: 50
      MAX_MESSAGES: 5000
    networks:
      - bigdata-net
    restart: "no"

  spark:
    image: jupyter/all-spark-notebook:spark-3.5.0
    container_name: spark-master
    depends_on:
      - kafka
    ports:
      - "8888:8888"   # Jupyter arayüzü
      - "4040:4040"   # Spark UI
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
    user: root
    volumes:
      - ./spark_workspace:/home/jovyan/work
    networks:
      - bigdata-net

networks: # Tüm servislerin haberleştiği özel ağ, container değil
  bigdata-net:
    driver: bridge